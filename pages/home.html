    <main class="main-content">

        <section>
            <div class="container mt-4">
                <div id="pdf">
                    <button onclick="exportarPDF()" class="btn btn-danger">
                        Exportar PDF
                    </button>
                </div>

                <h2 class="mb-3">Lista de atendimentos</h2>

                <table id="table" data-toggle="table" data-pagination="true" data-page-size="5" data-locale="pt-BR" data-toolbar="#pdf"
                    data-page-list="[10,25,50,100, All]" data-search="true" data-show-columns="true"
                    data-show-refresh="true" data-show-toggle="true" data-show-export="true" data-export-data-type="all"
                    data-export-types='["pdf","xlsx","csv","excel","txt"]' class="table">
                    <thead class="thead-dark">
                        <tr>
                            <th data-field="atendente" data-sortable="true">Atendente</th>
                            <th data-field="atendido" data-sortable="true">Atendido</th>
                            <th data-field="categoria" data-sortable="true">Categoria</th>
                            <th data-field="servico" data-sortable="true">Serviço</th>
                            <th data-field="duracao" data-sortable="true">Duração</th>
                        </tr>
                    </thead>
                </table>

            </div>
        </section>





        <div vw class="enabled">
